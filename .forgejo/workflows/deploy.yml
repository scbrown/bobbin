# aegis-mqnl: internal hostnames/user/webhook were REMOVED from this
# public file and replaced with Forgejo repo variables. If this workflow
# still runs on a Forgejo instance, set: BUILD_HOST, BUILD_USER,
# DEPLOY_HOST, DEPLOY_NOTIFY_URL — or it fails (loudly, by design).
# Likely VESTIGIAL: bobbin migrated to GitHub, which does not run
# .forgejo/ workflows. Kept parameterized rather than deleted, pending
# owner confirmation it is retired.
name: Deploy Bobbin

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.forgejo/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: deploy

    steps:
      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY secret is not set"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.BUILD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build on build host
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"

          # Build in dedicated CI directory (preserves cargo cache across runs)
          # Source: GitHub (canonical) — Forgejo mirror has divergent CLI code
          $SSH ${{ vars.BUILD_USER }}@${{ vars.BUILD_HOST }} "
            set -e
            . ~/.cargo/env
            if [ ! -d ~/bobbin-ci/.git ]; then
              git clone git@github.com:scbrown/bobbin.git ~/bobbin-ci
            fi
            cd ~/bobbin-ci
            # Ensure remote points to GitHub (migration from Forgejo)
            git remote set-url origin git@github.com:scbrown/bobbin.git
            git fetch origin main
            git reset --hard origin/main
            cargo build --release 2>&1 | tail -20
            cargo test 2>&1 | tail -30
            echo '---'
            ls -lh target/release/bobbin
          "

      - name: Deploy to build host
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          $SSH ${{ vars.BUILD_USER }}@${{ vars.BUILD_HOST }} "
            cp ~/bobbin-ci/target/release/bobbin ~/.local/bin/bobbin
            echo \"build host: \$(~/.local/bin/bobbin --version)\"
          "

      - name: Deploy to serving host
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"

          # Pull binary from build host to runner
          $SCP ${{ vars.BUILD_USER }}@${{ vars.BUILD_HOST }}:~/bobbin-ci/target/release/bobbin /tmp/bobbin

          # Zero-downtime deploy: copy to staging path, then atomic mv + restart
          # This minimizes the window where the binary is unavailable
          $SCP /tmp/bobbin root@${{ vars.DEPLOY_HOST }}:/usr/local/bin/bobbin.new
          $SSH root@${{ vars.DEPLOY_HOST }} "
            chmod +x /usr/local/bin/bobbin.new
            mv /usr/local/bin/bobbin.new /usr/local/bin/bobbin
            mkdir -p /opt/bobbin
            cp /usr/local/bin/bobbin /opt/bobbin/bobbin
            systemctl restart bobbin
          "
          sleep 3

          rm -f /tmp/bobbin

      - name: Smoke test
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          PASSED=0
          FAILED=0

          # Test 1: build host binary works
          VER=$($SSH ${{ vars.BUILD_USER }}@${{ vars.BUILD_HOST }} "~/.local/bin/bobbin --version" 2>&1) || VER="error"
          if echo "$VER" | grep -q "bobbin"; then
            echo "  PASS: build host — $VER"
            PASSED=$((PASSED + 1))
          else
            echo "  FAIL: build host version — $VER"
            FAILED=$((FAILED + 1))
          fi

          # Test 2: serving host service active
          STATUS=$($SSH root@${{ vars.DEPLOY_HOST }} "systemctl is-active bobbin" 2>&1) || STATUS="unknown"
          if [ "$STATUS" = "active" ]; then
            echo "  PASS: serving host service active"
            PASSED=$((PASSED + 1))
          else
            echo "  FAIL: serving host service — $STATUS"
            FAILED=$((FAILED + 1))
          fi

          # Test 3: serving host HTTP health
          HTTP=$($SSH root@${{ vars.DEPLOY_HOST }} "curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/status" 2>&1) || HTTP="000"
          if [ "$HTTP" = "200" ]; then
            echo "  PASS: serving host HTTP 200"
            PASSED=$((PASSED + 1))
          else
            echo "  FAIL: serving host HTTP — $HTTP"
            FAILED=$((FAILED + 1))
          fi

          echo ""
          echo "=== Smoke: ${PASSED} passed, ${FAILED} failed ==="
          if [ "$FAILED" -gt 0 ]; then exit 1; fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/bobbin

      - name: Notify (Success)
        if: success()
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST ${{ vars.DEPLOY_NOTIFY_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "status": "SUCCESS",
              "title": "Bobbin Deploy Complete",
              "message": "Built and deployed to build + serving hosts, smoke tests passed",
              "ruleUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook failed"

      - name: Notify (Failure)
        if: failure()
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST ${{ vars.DEPLOY_NOTIFY_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "status": "FAILED",
              "title": "Bobbin Deploy Failed",
              "message": "Build or deploy failed — check CI logs",
              "ruleUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook failed"
