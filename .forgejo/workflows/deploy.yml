# Deploy Bobbin — glibc-safe build + gated, rollback-capable cutover (bobbin-nimn0).
#
# HISTORY / SCOPE. The previous deploy built on a remote build host and then `mv`d
# the binary over the live one and restarted BEFORE anything checked it — so a
# binary built for a newer glibc than the serving host (the build-host-glibc-drift
# landmine) took the service DOWN with no rollback. This rewires both halves:
#   - BUILD is glibc-safe BY CONSTRUCTION: bobbin's only build-time ABI constraint
#     is glibc (ort/onnxruntime are dlopen'd at RUNTIME — `load-dynamic`), so we
#     build in an image whose glibc is <= the serving host's. No CUDA/onnxruntime
#     is needed in the build image.
#   - CUTOVER is gated: scripts/deploy-cutover.sh runs `--version` on the STAGED
#     binary ON THE SERVING HOST (where a glibc mismatch dies) before it can touch
#     the live one, snapshots live -> bobbin.prev, atomic-swaps, and rolls back on
#     any smoke failure. Proven by scripts/test-deploy-cutover.sh (no host needed).
#
# Internal hostnames are Forgejo repo variables (DEPLOY_HOST) / secrets, not baked
# in (the scrub ratchet). RE-ENABLE / PLATFORM is the owner's call: this is a .forgejo/
# workflow and bobbin's canonical remote is GitHub (which runs .github/ only), so
# standing this back up means either a Forgejo runner labelled `deploy` (with docker
# for the container build) or porting to .github/ on a self-hosted runner.
name: Deploy Bobbin

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/deploy-cutover.sh'
      - '.forgejo/workflows/deploy.yml'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY secret is not set"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build (glibc-safe container)
        run: |
          # glibc 2.31 (bullseye) <= the serving host's glibc, so the binary runs
          # there regardless of the runner's own glibc. ort is load-dynamic, so no
          # onnxruntime/CUDA is needed at build time — only rust + glibc. If this
          # runner has no docker, the step fails HERE, loudly, before touching the
          # serving host (a failed build is safe; a bad cutover is not).
          #
          # --features knowledge is LOAD-BEARING, not a nicety. The serving host
          # runs a knowledge-ENABLED binary (#56). A featureless
          # `cargo build --release` here produces a binary that PASSES the cutover
          # --version gate (a featureless binary still prints its version) and then
          # SILENTLY STRIPS the knowledge feature off the serving host on cutover —
          # the gate cannot see the difference (a feature-AWARE gate that refuses a
          # cutover dropping a feature is a separate, still-open follow-up). So the
          # SHIPPED artifact must be built with the features the serving host runs.
          # `cargo test` stays featureless on purpose: it recompiles independently,
          # the knowledge tests can need a live Quipu the build container has not
          # got, and turning them on in CI is a separate deliberate call — this
          # change only fixes the shipped BINARY.
          docker run --rm \
            -v "$PWD":/src -w /src \
            -v bobbin-cargo-registry:/usr/local/cargo/registry \
            rust:1-bullseye \
            bash -euc 'cargo build --release --features knowledge && cargo test'
          test -x target/release/bobbin
          echo "built: $(file target/release/bobbin | cut -d, -f1-2)"

      - name: Cut over to serving host (gated + rollback)
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
        run: |
          # The atomic, --version-gated, rollback-capable cutover. A glibc-
          # mismatched or otherwise-broken binary is REFUSED here and the live
          # binary is left untouched (bobbin-nimn0). See the script for the contract.
          bash scripts/deploy-cutover.sh target/release/bobbin

      - name: Notify (Success)
        if: success()
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST ${{ vars.DEPLOY_NOTIFY_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "status": "SUCCESS",
              "title": "Bobbin Deploy Complete",
              "message": "Built (glibc-safe) and cut over to the serving host; gate + smoke passed",
              "ruleUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook failed"

      - name: Notify (Failure)
        if: failure()
        run: |
          curl -s --connect-timeout 5 --max-time 10 -X POST ${{ vars.DEPLOY_NOTIFY_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "status": "FAILED",
              "title": "Bobbin Deploy Failed",
              "message": "Build failed, or cutover was REFUSED / rolled back (serving host untouched or restored) — check CI logs",
              "ruleUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook failed"
