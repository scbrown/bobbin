name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler cmake g++

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      # `knowledge` gates bobbin's entire Quipu integration (MCP surface, coupling
      # exporter, PPR reranking) and is NOT a cargo default feature. CI never passed
      # it, so none of that code was ever compiled here and its tests passed while
      # guarding nothing (bobbin-jdlkh). Build BOTH ways, every time:
      #   --features knowledge  -> the integration is actually compiled + tested
      #   (no features)         -> the default build, incl. the cfg(not(knowledge))
      #                            guard that refuses a PPR request it cannot serve
      # Dropping either arm re-creates the bug: whichever side goes unbuilt goes dark.
      - name: Check (knowledge)
        run: cargo check --features knowledge

      - name: Check (default, no features)
        run: cargo check

      - name: Test (knowledge)
        run: cargo test --features knowledge

      - name: Test (default, no features)
        run: cargo test

      - name: Clippy (knowledge)
        run: cargo clippy --features knowledge

      - name: Clippy (default, no features)
        run: cargo clippy
